  <!-- Critical CSS -->
  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #000;
      color: #fff;
    }

    #initial-loader {
      position: fixed;
      inset: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      will-change: opacity;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0.3; }
    }

    .blink {
      animation: blink 2.5s infinite;
    }

    .motion-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      cursor: default;
      padding: 0;
      transition: opacity 0.2s ease;
    }

    .motion-btn:hover {
      opacity: 0.85;
    }

    .logo-box {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #5e6ad2, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box span {
      font-family: 'Roboto', sans-serif;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }

    .name {
      font-family: 'Roboto', sans-serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.01em;
    }

    /* Dark mode auto */
    @media (prefers-color-scheme: light) {
      body {
        background: #fff;
        color: #000;
      }
    }
  </style>

<body>
